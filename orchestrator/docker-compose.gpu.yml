version: "3.9"

# GPU override – merge on top of docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  orchestrator:
    build:
      dockerfile: Dockerfile.gpu
    image: llama-orchestrator:gpu
    environment:
      GPU_LAYERS: "${GPU_LAYERS:-99}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
