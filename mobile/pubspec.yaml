name: llm_cluster
description: LLM Cluster – mobile worker and inference client for iOS and Android.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for cluster API calls + streaming SSE
  http: ^1.2.1
  dio: ^5.4.3

  # mDNS service discovery
  nsd: ^0.6.0

  # Local model inference (llama.cpp wrapper)
  # https://pub.dev/packages/lcpp  (community llama.cpp bindings)
  lcpp: ^0.3.0

  # Background service (Android foreground service / iOS background task)
  flutter_background_service: ^5.0.5

  # Local notifications (Android foreground service notification)
  flutter_local_notifications: ^17.2.1

  # Persistent settings
  shared_preferences: ^2.3.1

  # File picker (select GGUF model file)
  file_picker: ^8.1.2

  # State management
  provider: ^6.1.2

  # Chat markdown rendering
  flutter_markdown: ^0.7.3

  # Network info (WiFi SSID, IP address)
  network_info_plus: ^6.0.1

  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
